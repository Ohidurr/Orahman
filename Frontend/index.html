<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Ohidur Rahman — Site Reliability Engineer</title>
    <meta name="description" content="Ohidur Rahman — Site Reliability Engineer based in New York. CCNY Grove School of Engineering graduate." />
    <meta name="author" content="Ohidur Rahman" />

    <!-- Theme color updates with theme; the inline script below picks the right one before paint. -->
    <meta name="theme-color" content="#0a0a15" />

    <!-- OG / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ohidur Rahman — Site Reliability Engineer" />
    <meta property="og:description" content="SRE who cut MTTR from 3hr+ to under 60 min and ships observability teams actually use." />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      No-flash init: runs before React hydrates so the theme + palette are
      already on <html> when the first paint happens. Keeps the page from
      flashing the wrong colors for a frame.
    -->
    <script>
      (function() {
        var PALETTES = ['aurora','sunset','ocean','forest','nebula','ember','parchment'];
        try {
          var stored = localStorage.getItem('theme');
          var sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', stored || sys);
          var mode = localStorage.getItem('resumeMode') || 'recruiter';
          document.documentElement.setAttribute('data-mode', mode);
          var palette = PALETTES[Math.floor(Math.random() * PALETTES.length)];
          document.documentElement.setAttribute('data-palette', palette);
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.setAttribute('data-mode', 'recruiter');
          document.documentElement.setAttribute('data-palette', 'aurora');
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this site.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
